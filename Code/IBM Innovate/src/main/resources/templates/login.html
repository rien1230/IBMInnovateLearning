<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth.js"></script>
</head>
<body class="bg-gradient-to-bl from-white via-sky-200 via-sky-400/100 to-blue-500">
<!-- Navbar -->
<nav class="bg-none text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
        <a href="/login" class="logo text-2xl font-bold hover:text-blue-200 transition-colors duration-300">
            IBMinnovate
        </a>
        <div class="nav-buttons flex space-x-4">
            <a href="/login" class="nav-btn bg-blue-500 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-300">
                Login
            </a>
            <a href="/register" class="nav-btn bg-blue-500 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-300">
                Register
            </a>
        </div>
    </div>
</nav>

<!-- Login Form -->
<div class="wrapper flex items-center justify-center min-h-screen">
    <div class="bg-gradient-to-br from-gray-100 via-sky-200 via-sky-400/100 to-blue-500 p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="title-text text-center mb-6">
            <div class="title text-3xl font-bold text-gray-800">Log in</div>
        </div>
        <div class="form-container">
            <div class="form-inner">
                <!-- Login Form -->
                <form id="loginForm" class="login">
                    <!-- Email Field -->
                    <div class="field mb-4">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Email Address" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>

                    <!-- Password Field -->
                    <div class="field mb-4">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    </div>

                    <input type="checkbox" onclick="passwordVisible()"> Show Password

                    <!-- Forgot Password Link -->
                    <div class="pass-link text-right mb-6">
                        <a href="/password" class="text-red-500 hover:text-red-700">Forgot password?</a>
                    </div>

                    <!-- Error Message Display -->
                    <div id="errorMessage" class="text-red-500 mb-4"></div>

                    <!-- Success Message Display -->
                    <div id="successMessage" class="text-green-500 mb-4"></div>

                    <!-- Submit Button -->
                    <div class="field">
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors duration-300">
                            Login
                        </button>
                    </div>
                </form>
            </div>
            <br>
            <div class="flex justify-center mt-4">
                <a href="/oauth2/authorization/google" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition">
                    Sign in with Google
                </a>
            </div>
        </div>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
