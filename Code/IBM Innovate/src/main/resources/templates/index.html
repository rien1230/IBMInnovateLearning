<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Progress Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom left, white, #bae6fd, #0ea5e9, #2563eb);
      min-height: 100vh;
    }
    .achievement-card {
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      position: relative;
      width: 200px;
      height: 200px;
      perspective: 1000px;
      cursor: pointer;
    }
    .achievement-card .front,
    .achievement-card .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.6s;
    }
    .achievement-card .front {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      font-size: 20px;
      font-weight: bold;
    }
    .achievement-card .back {
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
      color: #333;
      transform: rotateY(180deg);
      padding: 10px;
    }
    .achievement-card:hover .front {
      transform: rotateY(180deg);
    }
    .achievement-card:hover .back {
      transform: rotateY(0deg);
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .treasure-map {
      position: relative;
      width: 100%;
      height: 700px;
      background: url('map.jpg') no-repeat center center/contain;
      border-radius: 10px;
    }
    .map-pin {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.3s ease;
      position: absolute;
    }
    .map-pin.unlocked {
      color: gold;
      cursor: pointer;
    }
    .map-pin.locked {
      color: gray;
      cursor: not-allowed;
    }
    .map-pin:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-none shadow-md">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="/dashboard">IBMinnovate</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-dark" href="/courses">All Courses</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" href="/profile">Profile</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger" href="/logout" id="logoutLink">Log out</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<br>
<br>
<div class="container mt-5">
  <h1 class="text-center mb-4">Student Progress Tracker</h1>

  <!-- Ongoing Courses Display -->
  <div class="card mb-4">
    <div class="card-body">
      <h2 class="card-title">Ongoing Courses</h2>
      <div id="ongoingCoursesList"></div>
    </div>
  </div>

  <!-- Completed Courses Display -->
  <div class="card mb-4">
    <div class="card-body">
      <h2 class="card-title">Completed Courses</h2>
      <div id="completedCoursesList"></div>
    </div>
  </div>

  <!-- Achievements Display -->
  <div class="card mb-4">
    <div class="card-body">
      <h2 class="card-title">Achievements</h2>
      <div id="achievementsList" class="d-flex flex-wrap gap-3"></div>
    </div>
  </div>

  <!-- Treasure Map -->
  <div class="card mt-4">
    <div class="card-body">
      <h2 class="card-title">Treasure Map</h2>
      <div class="treasure-map">
        <!-- Pins will be dynamically added here -->
      </div>
    </div>
  </div>
</div>

<script src="/index.js"></script>
</body>
</html>
