<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
   <meta charset="utf-8">
   <title>Register</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gradient-to-bl from-white via-sky-200 via-sky-400/100 to-blue-500">
<!-- Navbar -->
<nav class="bg-none text-white p-4 shadow-lg">
   <div class="container mx-auto flex justify-between items-center">
      <a href="courses.html" class="logo text-2xl font-bold hover:text-blue-200 transition-colors duration-300">
         IBMinnovate
      </a>
      <div class="nav-buttons flex space-x-4">
         <a href="/login" class="nav-btn bg-blue-500 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-300">
            Login
         </a>
         <a href="/register" class="nav-btn bg-blue-500 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-300">
            Register
         </a>
      </div>
   </div>
</nav>

<!-- Register Form -->
<div class="wrapper flex items-center justify-center min-h-screen">
   <div class="bg-gradient-to-br from-gray-100 via-sky-200 via-sky-400/100 to-blue-500 p-8 rounded-lg shadow-lg w-full max-w-md">
      <div class="title-text text-center mb-6">
         <div class="title text-3xl font-bold text-gray-800">Register</div>
      </div>
      <div class="form-container">
         <div class="form-inner">
            <!-- Register Form -->
            <form id="registerForm" action="/register" method="post" class="login">
               <!-- Name Field -->
               <div class="field mb-4">
                  <input type="text" id="username" name="username" placeholder="Username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
               </div>

               <!-- Email Field -->
               <div class="field mb-4">
                  <input type="email" id="email" name="email" placeholder="Email Address" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                  <div id="emailError" class="text-red-500 text-sm mt-1"></div>
               </div>

               <!-- Password Field -->
               <div class="field mb-4">
                  <input type="password" id="password" name="password" placeholder="Password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                  <div id="passwordError" class="text-red-500 text-sm mt-1"></div>
               </div>
               <!-- Password visibility toggle -->
               <input type="checkbox" onclick="passwordVisible()"> Show Password

               <!-- Confirm Password Field -->
               <div class="field mb-4">
                  <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
               </div>

               <!-- Error Message Display -->
               <div th:if="${error}" class="text-red-500 mb-4" th:text="${error}"></div>

               <!-- Success Message Display -->
               <div th:if="${message}" class="text-green-500 mb-4" th:text="${message}"></div>

               <!-- Submit Button -->
               <div class="field">
                  <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors duration-300">
                     Register
                  </button>
               </div>
            </form>

            <!-- Link to Login Page -->
            <div class="pass-link text-right mt-4">
               <a href="/login" class="text-red-500 hover:text-red-700">Already have an account? Login here.</a>
            </div>
         </div>
      </div>
   </div>
</div>

<script>
   // Email validation
   const emailInput = document.getElementById('email');
   const emailError = document.getElementById('emailError');

   emailInput.addEventListener('input', () => {
      const email = emailInput.value;
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailPattern.test(email)) {
         emailError.textContent = 'This is not a valid email address.';
      } else {
         emailError.textContent = '';
      }
   });

   // Password validation
   const passwordInput = document.getElementById('password');
   const passwordError = document.getElementById('passwordError');

   passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[_@&^$#\-/!])[A-Za-z\d_@&^$#\-/!]{8,32}$/;

      if (password.length < 8 || password.length > 32) {
         passwordError.textContent = 'Password must be between 8-32 characters long.';
      } else if (!passwordPattern.test(password)) {
         passwordError.textContent = 'Password must contain at least 1 lowercase, 1 uppercase, 1 number, and 1 special character (_, @, &, ^, $, #, -, /).';
      } else {
         passwordError.textContent = '';
      }
   });

   //Password Visiblity Toggle
   function passwordVisible() {
      var x = document.getElementById("password");
      if (x.type === "password") {
         x.type = "text";
      } else {
         x.type = "password";
      }
   }
</script>
</body>
</html>
