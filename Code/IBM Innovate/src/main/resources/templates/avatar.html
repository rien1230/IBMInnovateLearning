<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Avatar Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        let avatarUrl = ""; // Store the avatar URL globally

        function updateAvatar() {
            let avatarStyle = document.querySelector('input[name="avatarStyle"]:checked').value;
            let topType = document.getElementById("topType").value;
            let accessoriesType = document.getElementById("accessoriesType").value;
            let hairColor = document.getElementById("hairColor").value;
            let facialHairType = document.getElementById("facialHairType").value;
            let clotheType = document.getElementById("clotheType").value;
            let eyeType = document.getElementById("eyeType").value;
            let eyebrowType = document.getElementById("eyebrowType").value;
            let mouthType = document.getElementById("mouthType").value;
            let skinColor = document.getElementById("skinColor").value;

            avatarUrl = `https://avataaars.io/?avatarStyle=${avatarStyle}&topType=${topType}&accessoriesType=${accessoriesType}&hairColor=${hairColor}&facialHairType=${facialHairType}&clotheType=${clotheType}&eyeType=${eyeType}&eyebrowType=${eyebrowType}&mouthType=${mouthType}&skinColor=${skinColor}`;
            document.getElementById("avatar").src = avatarUrl;
        }

        async function saveAvatar() {
            try {
                const response = await fetch('http://localhost:8080/save-avatar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ avatarUrl }),
                });

                if (response.ok) {
                    alert('Avatar saved successfully!');
                } else {
                    alert('Failed to save avatar.');
                }
            } catch (error) {
                console.error('Error saving avatar:', error);
                alert('An error occurred while saving the avatar.');
            }
        }
    </script>
</head>
<body class="bg-gradient-to-bl from-white via-sky-200 via-sky-400/100 to-blue-500">
<!-- Navigation Bar -->
<nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <a href="/dashboard" class="text-2xl font-bold text-blue-600">IBMinnovate</a>
            <div class="flex space-x-4">
                <a href="/courses" class="text-gray-700 hover:text-blue-600">All Courses</a>
                <a href="/dashboard" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                <a href="/friends" class="text-gray-700 hover:text-blue-600">Friends</a>
                <a href="/profile" class="text-gray-700 hover:text-blue-600">Profile</a>
                <a href="/login" class="text-gray-700 hover:text-blue-600">Log out</a>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-center mb-6">Custom Avatar Generator</h1>

    <!-- Avatar Display -->
    <div class="flex justify-center mb-8">
        <img id="avatar" src="https://avataaars.io/?avatarStyle=Circle&topType=LongHairStraight&accessoriesType=Blank&hairColor=BrownDark&facialHairType=Blank&clotheType=BlazerShirt&eyeType=Default&eyebrowType=Default&mouthType=Default&skinColor=Light" alt="Avatar" width="250" class="rounded-full">
    </div>

    <!-- Customization Options -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Avatar Style -->
        <fieldset class="col-span-2">
            <legend class="text-lg font-semibold mb-2">Avatar Style</legend>
            <div class="flex gap-4">
                <label class="flex items-center gap-2">
                    <input type="radio" name="avatarStyle" value="Circle" checked onchange="updateAvatar()" class="form-radio">
                    Circle
                </label>
                <label class="flex items-center gap-2">
                    <input type="radio" name="avatarStyle" value="Transparent" onchange="updateAvatar()" class="form-radio">
                    Transparent
                </label>
            </div>
        </fieldset>

        <!-- Top Type -->
        <div>
            <label for="topType" class="block text-sm font-medium text-gray-700">Top:</label>
            <select id="topType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="LongHairStraight">Long Hair</option>
                <option value="ShortHairShortFlat">Short Hair</option>
                <option value="NoHair">Bald</option>
            </select>
        </div>

        <!-- Accessories Type -->
        <div>
            <label for="accessoriesType" class="block text-sm font-medium text-gray-700">Accessories:</label>
            <select id="accessoriesType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="Blank">None</option>
                <option value="PrescriptionGlasses">Glasses</option>
                <option value="Round">Round Glasses</option>
            </select>
        </div>

        <!-- Hair Color -->
        <div>
            <label for="hairColor" class="block text-sm font-medium text-gray-700">Hair Color:</label>
            <select id="hairColor" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="BrownDark">Brown Dark</option>
                <option value="Black">Black</option>
                <option value="Blonde">Blonde</option>
            </select>
        </div>

        <!-- Facial Hair Type -->
        <div>
            <label for="facialHairType" class="block text-sm font-medium text-gray-700">Facial Hair:</label>
            <select id="facialHairType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="Blank">None</option>
                <option value="BeardMedium">Medium Beard</option>
                <option value="BeardLight">Light Beard</option>
            </select>
        </div>

        <!-- Clothe Type -->
        <div>
            <label for="clotheType" class="block text-sm font-medium text-gray-700">Clothes:</label>
            <select id="clotheType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="BlazerShirt">Blazer Shirt</option>
                <option value="Hoodie">Hoodie</option>
                <option value="ShirtCrewNeck">Crew Neck Shirt</option>
            </select>
        </div>

        <!-- Eye Type -->
        <div>
            <label for="eyeType" class="block text-sm font-medium text-gray-700">Eyes:</label>
            <select id="eyeType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="Default">Default</option>
                <option value="Happy">Happy</option>
                <option value="Squint">Squint</option>
            </select>
        </div>

        <!-- Eyebrow Type -->
        <div>
            <label for="eyebrowType" class="block text-sm font-medium text-gray-700">Eyebrow:</label>
            <select id="eyebrowType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="Default">Default</option>
                <option value="Angry">Angry</option>
                <option value="RaisedExcited">Raised Excited</option>
            </select>
        </div>

        <!-- Mouth Type -->
        <div>
            <label for="mouthType" class="block text-sm font-medium text-gray-700">Mouth:</label>
            <select id="mouthType" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="Default">Default</option>
                <option value="Smile">Smile</option>
                <option value="Serious">Serious</option>
            </select>
        </div>

        <!-- Skin Color -->
        <div>
            <label for="skinColor" class="block text-sm font-medium text-gray-700">Skin Color:</label>
            <select id="skinColor" onchange="updateAvatar()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="Light">Light</option>
                <option value="Brown">Brown</option>
                <option value="DarkBrown">Dark Brown</option>
            </select>
        </div>
    </div>

    <!-- Save Avatar Button -->
    <div class="mt-6 text-center">
        <button onclick="saveAvatar()" class="bg-blue-600 text-white rounded-lg px-6 py-2 hover:bg-blue-700 transition duration-300">
            Save Avatar
        </button>
    </div>
</div>
<script>
    async function saveAvatar() {
        try {
            const response = await fetch('http://localhost:8080/save-avatar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ avatarUrl }),
            });

            if (response.ok) {
                alert('Avatar saved successfully!');
            } else {
                alert('Failed to save avatar.');
            }
        } catch (error) {
            console.error('Error saving avatar:', error);
            alert('An error occurred while saving the avatar.');
        }
    }
</script>
</body>
</html>
