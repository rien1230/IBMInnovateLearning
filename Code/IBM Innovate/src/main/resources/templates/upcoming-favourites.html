<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Courses & Favourites</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .course-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .star-button {
            cursor: pointer;
            font-size: 24px;
        }
        .star-button.favourite {
            color: gold;
        }
    </style>
</head>
<body class="bg-gray-100">
<nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <a href="/dashboard" class="text-2xl font-bold text-blue-600">IBMinnovate</a>
            <div class="flex space-x-4">
                <a href="/courses" class="text-gray-700 hover:text-blue-600">All Courses</a>
                <a href="/dashboard" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                <a href="/profile" class="text-gray-700 hover:text-blue-600">Profile</a>
                <a href="/logout" id="logoutLink" class="text-gray-700 hover:text-blue-600">Log out</a>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto mt-10 p-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Upcoming Courses & Favourites</h1>

    <!-- Upcoming Courses Section -->
    <div class="mb-8">
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Upcoming Courses</h2>
        <div id="upcomingCoursesList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <!-- Upcoming courses will be dynamically added here -->
        </div>
    </div>

    <!-- Favourites Section -->
    <div>
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Favourites</h2>
        <div id="favouritesList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <!-- Favourite courses will be dynamically added here -->
        </div>
    </div>
</div>

<script>
    // Fetch and display upcoming courses and favourites
    async function fetchData() {
        const userId = localStorage.getItem('userId');
        if (!userId) {
            alert('Please log in to view your upcoming courses and favourites.');
            window.location.href = '/login';
            return;
        }

        try {
            // Fetch upcoming courses
            const upcomingResponse = await fetch(`/progress/upcoming-courses/${userId}`);
            if (!upcomingResponse.ok) {
                throw new Error('Failed to fetch upcoming courses');
            }
            const upcomingCourses = await upcomingResponse.json();

            // Fetch favourites
            const favouritesResponse = await fetch(`/progress/favourites/${userId}`);
            if (!favouritesResponse.ok) {
                throw new Error('Failed to fetch favourites');
            }
            const favourites = await favouritesResponse.json();

            // Display upcoming courses
            const upcomingCoursesList = document.getElementById('upcomingCoursesList');
            upcomingCoursesList.innerHTML = upcomingCourses.map(course => `
                <div class="course-card bg-white">
                    <h3 class="text-xl font-bold mb-2">${course.courseName}</h3>
                    <p class="text-gray-600 mb-4">${course.description}</p>
                    <button class="star-button" onclick="toggleFavourite(${course.courseId})">${favourites.some(fav => fav.courseId === course.courseId) ? '⭐' : '☆'}</button>
                </div>
            `).join('');

            // Display favourites
            const favouritesList = document.getElementById('favouritesList');
            favouritesList.innerHTML = favourites.map(course => `
                <div class="course-card bg-white">
                    <h3 class="text-xl font-bold mb-2">${course.courseName}</h3>
                    <p class="text-gray-600 mb-4">${course.description}</p>
                    <button class="star-button favourite" onclick="toggleFavourite(${course.courseId})">⭐</button>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error fetching data:', error);
            alert('Failed to load data. Please try again.');
        }
    }

    // Toggle favourite status
    async function toggleFavourite(courseId) {
        const userId = localStorage.getItem('userId');
        if (!userId) {
            alert('Please log in to toggle favourites.');
            return;
        }

        try {
            const response = await fetch('/progress/toggle-favourite', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    userId: userId,
                    courseId: courseId,
                }),
            });

            if (!response.ok) {
                throw new Error('Failed to toggle favourite status');
            }

            const data = await response.json();
            alert(data.message); // Show success message

            // Refresh the data to update the UI
            fetchData();
        } catch (error) {
            console.error('Error toggling favourite status:', error);
            alert('Failed to toggle favourite status. Please try again.');
        }
    }

    // Fetch data when the page loads
    document.addEventListener('DOMContentLoaded', fetchData);
</script>
</body>
</html>
