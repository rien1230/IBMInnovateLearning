<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Avatar Customization</title>
  <script src="https://cdn.tailwindcss.com"></script> <!-- Fixed Tailwind CSS URL -->
</head>
<body class="bg-gradient-to-bl from-white via-purple-200 via-purple-400/100 to-indigo-500">
<!-- Navigation Bar -->
<nav class="bg-white shadow-md">
  <div class="max-w-6xl mx-auto px-4">
    <div class="flex justify-between items-center py-4">
      <a href="/dashboard" class="text-2xl font-bold text-purple-600">IBMinnovate</a>
      <div class="flex space-x-4">
        <a href="/courses" class="text-gray-700 hover:text-purple-600">All Courses</a>
        <a href="/dashboard" class="text-gray-700 hover:text-purple-600">Dashboard</a>
        <a href="/friends" class="text-gray-700 hover:text-purple-600">Friends</a>
        <a href="/profile" class="text-gray-700 hover:text-purple-600">Profile</a>
        <a href="/login" class="text-gray-700 hover:text-purple-600">Log out</a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md text-center">
  <h2 class="text-2xl font-semibold text-gray-800 mb-4">Customize Your Avatar</h2>
  <p class="text-gray-600 mb-4">Use the Ready Player Me avatar system to create a unique look!</p>

  <!-- Ready Player Me Iframe -->
  <iframe
          src="https://readyplayer.me/avatar?frameApi"
          style="width: 100%; height: 600px; border: none;"
          allow="camera; microphone; clipboard-write">
  </iframe>

  <!-- Save Button -->
  <button onclick="saveAvatar()" class="mt-4 px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition duration-300">
    Save Avatar
  </button>
</div>

<script>
  function saveAvatar() {
    alert("Avatar customization saved!");
  }
</script>
</body>
</html>
