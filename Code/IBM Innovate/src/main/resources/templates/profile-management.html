<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-bl from-white via-sky-200 via-sky-400/100 to-blue-500">

<!-- Content Container -->
<div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <p class="text-center text-gray-600">:)</p>
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Profile Management</h1>

    <!-- Change Details Section -->
    <div class="mb-8">
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Change Details</h2>

        <!-- Name Update Form -->
        <form id="updateNameForm" class="space-y-4 mb-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name:</label>
                <input type="text" id="name" name="name"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                Update Name
            </button>
        </form>

        <!-- Email Update Form -->
        <form id="updateEmailForm" class="space-y-4 mb-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email:</label>
                <input type="email" id="email" name="email"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                Update Email
            </button>
        </form>
    </div>

    <!-- Change Password Section -->
    <div>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Change Password</h2>
        <form id="updatePasswordForm" class="space-y-4">
            <div>
                <label for="currentPassword" class="block text-sm font-medium text-gray-700">Current Password:</label>
                <input type="password" id="currentPassword" name="currentPassword" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700">New Password:</label>
                <input type="password" id="newPassword" name="newPassword" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                Update Password
            </button>
        </form>
    </div>

    <!-- Return to Profile Button -->
    <div class="mt-8 text-center">
        <a href="/profile" class="inline-flex items-center text-blue-600 hover:text-blue-800">
            <span class="mr-2">←</span> Return to Profile
        </a>
    </div>
</div>

<script>
    // Handle Name Update Form Submission
    document.getElementById('updateNameForm').addEventListener('submit', async (event) => {
        event.preventDefault(); // Prevent default form submission

        const name = document.getElementById('name').value;
        const userId = localStorage.getItem('userId'); // Get userId from localStorage

        console.log('Updating name:', name); // Debugging

        // Remove the old userName from localStorage
        localStorage.removeItem('userName');

        try {
            const response = await fetch('/update-name', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json', // Send JSON
                },
                body: JSON.stringify({ userId, name }), // Send data as JSON
            });

            const result = await response.text();
            console.log('Name update response:', result); // Debugging

            if (response.ok) {
                alert(result); // Show success message
                localStorage.setItem('userName', name); // Update localStorage with new name
                console.log('Local storage updated with new name:', name); // Debugging
            } else {
                alert(result); // Show error message
            }
        } catch (error) {
            console.error('Error updating name:', error);
            alert('Failed to update name.');
        }
    });

    // Handle Email Update Form Submission
    document.getElementById('updateEmailForm').addEventListener('submit', async (event) => {
        event.preventDefault(); // Prevent default form submission

        const email = document.getElementById('email').value;
        const userId = localStorage.getItem('userId'); // Get userId from localStorage

        console.log('Updating email:', email); // Debugging

        // Remove the old userEmail from localStorage
        localStorage.removeItem('userEmail');

        try {
            const response = await fetch('/update-email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json', // Send JSON
                },
                body: JSON.stringify({ userId, email }), // Send data as JSON
            });

            const result = await response.text();
            console.log('Email update response:', result); // Debugging

            if (response.ok) {
                alert(result); // Show success message
                localStorage.setItem('userEmail', email); // Update localStorage with new email
                console.log('Local storage updated with new email:', email); // Debugging
            } else {
                alert(result); // Show error message
            }
        } catch (error) {
            console.error('Error updating email:', error);
            alert('Failed to update email.');
        }
    });

    // Handle Password Update Form Submission
    document.getElementById('updatePasswordForm').addEventListener('submit', async (event) => {
        event.preventDefault(); // Prevent default form submission

        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const userId = localStorage.getItem('userId'); // Get userId from localStorage

        console.log('Updating password:', newPassword); // Debugging

        if (newPassword !== confirmPassword) {
            alert('New passwords do not match!');
            return;
        }

        try {
            const response = await fetch('/update-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json', // Send JSON
                },
                body: JSON.stringify({ userId, currentPassword, newPassword }), // Send data as JSON
            });

            const result = await response.text();
            console.log('Password update response:', result); // Debugging

            if (response.ok) {
                alert(result); // Show success message
            } else {
                alert(result); // Show error message
            }
        } catch (error) {
            console.error('Error updating password:', error);
            alert('Failed to update password.');
        }
    });
</script>
</body>
</html>
