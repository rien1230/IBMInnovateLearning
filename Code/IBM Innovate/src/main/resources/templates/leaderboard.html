<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="leaderboard.css" />
  <script src = "leaderboard.js"></script>
</head>
<body class="bg-gradient-to-bl from-white via-sky-200 via-sky-400/100 to-blue-500 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-md">
  <div class="max-w-6xl mx-auto px-4">
    <div class="flex justify-between items-center py-4">
      <div class="text-2xl font-bold text-blue-600">IBMInnovate</div>
      <div class="space-x-4 text-center">
        <a href="/dashboard" class="text-gray-700 hover:text-blue-600">Dashboard</a>
        <a href="/courses" class="text-gray-700 hover:text-blue-600">All Courses</a>
        <a href="/profile" class="text-gray-700 hover:text-blue-600">Profile</a>
        <a href="/logout" class="text-gray-700 hover:text-blue-600">Log out</a>
      </div>
    </div>
  </div>
</nav>

<!-- Leaderboard Content -->
<div class="max-w-7xl mx-auto mt-12 px-4">
  <h1 class="text-3xl font-semibold text-center mb-8">Global Leaderboard</h1>

  <div class="overflow-x-auto shadow-md rounded-lg">
    <table class="min-w-full bg-white border border-gray-300 text-center">
      <thead class="bg-gray-100">
      <tr>
        <th class="border border-gray-300 px-6 py-3">Rank</th>
        <th class="border border-gray-300 px-6 py-3">Username</th>
        <th class="border border-gray-300 px-6 py-3">Experience</th>
      </tr>
      </thead>
      <tbody id="leaderboard-body" >
      <tr class="bg-white">
        <td class="border border-gray-300 px-6 py-2">1</td>
        <td class="border border-gray-300 px-6 py-2">Player1</td>
        <td class="border border-gray-300 px-6 py-2">700</td>
      </tr>
      <tr class="bg-gray-50">
        <td class="border border-gray-300 px-6 py-2">2</td>
        <td class="border border-gray-300 px-6 py-2">Player2</td>
        <td class="border border-gray-300 px-6 py-2">600</td>
      </tr>
      <tr class="bg-white">
        <td class="border border-gray-300 px-6 py-2">3</td>
        <td class="border border-gray-300 px-6 py-2">Player3</td>
        <td class="border border-gray-300 px-6 py-2">400</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
