<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-l from-blue-700 via-blue-400 to-gray-200 p-6">
<div class="max-w-md w-full bg-white/20 backdrop-blur-lg p-8 rounded-3xl shadow-lg">
    <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">Reset Password</h2>
    <p class="text-gray-600 text-sm text-center mb-3">Enter your email to receive a 6-digit OTP.</p>

    <input id="email" type="email" placeholder="Enter your email" class="w-full p-2 mt-1 border rounded-md focus:ring focus:ring-blue-200" required>
    <button id="sendOTP" class="w-full mt-3 bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 transition">Send OTP</button>
    
    <div id="otpSection" class=" hidden mt-4">
        <p class="text-center text-gray-600 text-sm mb-2">Enter the 6-digit OTP sent to your email</p>
        <div class="flex justify-center gap-2">
            <input type="text" maxlength="1" class="otp-input w-10 h-10 text-center border rounded-md focus:ring focus:ring-blue-200">
            <input type="text" maxlength="1" class="otp-input w-10 h-10 text-center border rounded-md focus:ring focus:ring-blue-200">
            <input type="text" maxlength="1" class="otp-input w-10 h-10 text-center border rounded-md focus:ring focus:ring-blue-200">
            <input type="text" maxlength="1" class="otp-input w-10 h-10 text-center border rounded-md focus:ring focus:ring-blue-200">
            <input type="text" maxlength="1" class="otp-input w-10 h-10 text-center border rounded-md focus:ring focus:ring-blue-200">
            <input type="text" maxlength="1" class="otp-input w-10 h-10 text-center border rounded-md focus:ring focus:ring-blue-200">
        </div>
        <button id="verifyOTP" class="w-full mt-3 bg-green-500 text-white py-2 rounded-md hover:bg-green-600 transition">Verify OTP</button>
    </div>
</div>

<script>


    document.getElementById("sendOTP").addEventListener("click", function() {
        const email = document.getElementById("email").value;
        console.log("Email:", email); // Log the email
        if (email) {
            fetch('/send-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email }),
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }

                    return response.json();
                })
                .then(data => {
                    console.log("Response data:", data); // Log the response
                    if (data.success) {
                        document.getElementById("otpSection").classList.remove("hidden");
                        alert("OTP sent to your email.");
                    } else {
                        alert("Failed to send OTP. Please try again.");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert(`An error occurred: ${error.message}`);
                });
        } else {
            alert("Please enter a valid email.");
        }
    });

    document.getElementById("verifyOTP").addEventListener("click", function() {
        const otpInputs = document.querySelectorAll(".otp-input");
        let otpCode = "";
        otpInputs.forEach(input => otpCode += input.value);

        if (otpCode.length === 6) {
            const email = document.getElementById("email").value;

            // Send OTP to backend for validation
            fetch('/validate-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email, otp: otpCode }),
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        alert("OTP verified successfully.");
                        window.location.href = "/dashboard"; // Redirect to dashboard
                    } else {
                        alert("Invalid OTP. Please try again.");
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert(`An error occurred: ${error.message}`);
                });
        } else {
            alert("Please enter a valid 6-digit OTP.");
        }
    });
</script>
</body>
</html>
