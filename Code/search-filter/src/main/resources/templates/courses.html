<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Courses</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
</head>
<body>
<!-- Allows user to input their search criteria -->
<h1>Search Courses</h1>
<form th:action="@{/courses/search}" method="get">
    <label for="searchTerm">Search Term (Course Name): </label>
    <input type="text" id="searchTerm" name="searchTerm" placeholder="Enter course name or tags" />

    <label for="duration">Duration: </label>
    <input type="text" id="duration" name="duration" placeholder="Enter duration (e.g. one month)" />

    <h3>Areas of Interest</h3>
    <label>
        <input type="checkbox" name="tags" value="AI" /> AI
    </label><br>
    <label>
        <input type="checkbox" name="tags" value="Cybersecurity" /> Cybersecurity
    </label><br>
    <label>
        <input type="checkbox" name="tags" value="Machine Learning" /> Machine Learning
    </label><br>
    <label>
        <input type="checkbox" name="tags" value="Programming" /> Programming
    </label><br>

    <button type="submit">Search</button>
</form>

<!-- Display the filtered courses -->
<div th:if="${courses != null}">
    <h2>Search Results</h2>
    <table>
        <thead>
        <tr>
            <th>Course Name</th>
            <th>Tags</th>
            <th>Duration</th>
            <th>Languages</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="course : ${courses}">
            <td th:text="${course.courseName}">Course Name</td>
            <td th:text="${course.tags}">Tags</td>
            <td th:text="${course.duration}">Duration</td>
            <td th:text="${course.languages}">Languages</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:if="${courses == null}">
    <p>No courses found matching your search criteria.</p>
</div>
</body>
</html>
