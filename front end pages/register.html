<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Register</title>
      <link rel="stylesheet" href="style.css">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
   </head>
   <body>
      <nav class="navbar clear">
         <!--for the sake of getting around the website for now its linked to the signed in sections-->
         <!--in practice will be changed to a homepage (index.html)-->
        <a href="courses.html" class="logo">IBMinnovate</a>
        <div class="nav-buttons">
            <a href="login.html" class="nav-btn">Login</a>
            <a href="register.html" class="nav-btn">Register</a>
        </div>
      </nav>
      <div class="wrapper">
         <div class="title-text">
            <div class="title">Register</div>
         </div>
         <div class="form-container">
            <div class="form-inner">
               <form action="#" class="login active">
                  <div class="field">
                     <input type="text" placeholder="Name" required>
                  </div>
                  <div class="field">
                     <input type="text" placeholder="Email Address" required>
                  </div>
                  <div class="field">
                     <input type="password" placeholder="Password" required>
                  </div>
                  <div class="field">
                     <input type="compare-password" placeholder="Confirm Password" required>
                  </div>
                  <div class="pass-link">
                     <a href="login.html">Already have an account?</a>
                  </div>
                  <div class="field btn">
                     <div class="btn-layer"></div>
                     <input type="submit" value="Register">
                  </div>
               </form>
            </div>
         </div>
      </div>
   </body>
</html>
